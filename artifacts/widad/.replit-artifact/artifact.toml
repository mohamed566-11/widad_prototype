kind = "web"
previewPath = "/"
title = "وداد تك"
version = "1.0.0"
id = "artifacts/widad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22882
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/widad run dev"

[services.env]
PORT = "22882"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/widad", "run", "build"]
publicDir = "artifacts/widad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
