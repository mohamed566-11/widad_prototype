packages:
  "react-router-dom": "Required for nested routing, auth guards, and complex navigation"
  "zustand": "Global state management for auth and user session"
  "recharts": "Beautiful charts for trackers (mood, weight, period) and admin analytics"
  "framer-motion": "Smooth page transitions and micro-interactions"
  "date-fns": "Date formatting and manipulation for mock data and charts"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes without style conflicts"
  "lucide-react": "Beautiful consistent icon set"

images:
