    description: "Soft abstract gradient background in warm pinks and purples, elegant feminine healthcare theme, blurred flowing shapes"
    aspect_ratio: "16:9"
  - path: "artifacts/widad/public/images/ai-avatar.png"
    description: "Friendly minimalist AI assistant avatar, glowing orb in soft pink and purple, premium tech feel"
